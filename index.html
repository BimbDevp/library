<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>My Library</title>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1 class="title">My Library</h1>
            <h3 class="intro">Your Personal Library, Neater and More Accessible.</h3>
        </div>

        <form class="form-container">
            <h3 class="intro text-form">Rediscover the Magic That Changed Your Life</h3>
            <div class="search-container">
                <label for="find-input">Find your book:</label>
                <input type="search" name="find-input" id="find-input">
            </div>
            <div class="btn-container">
                <button type="submit" class="submit-btn">Find</button>
                <button type="button" class="add-btn">Add a book</button>
            </div>
        </form>

        <div class="book-container"></div>

        <dialog class="book-details">
            <div class="info-content"></div>
            <button class="close-act">X</button>
        </dialog>

        <dialog class="add-container">
            <form class="book-form">
                <div>
                    <label for="title">Title:</label>
                    <input type="text" id="title" name="title">
                </div>

                <div>
                    <label for="author">Author:</label>
                    <input type="text" name="author" id="author">
                </div>

                <div>
                    <label for="pages">Pages:</label>
                    <input type="tel" name="pages" id="pages">
                </div>

                <div>
                    <p>Status</p>
                    <div>

                        <label for="read"><input type="radio" name="status" id="read" value="read">Read</label>
                    </div>
                    <div>

                        <label for="unread"> <input type="radio" name="status" id="unread" value="unread">Unread</label>
                    </div>
                </div>
                <div class="dialog-btn-container">
                    <button type="submit" class="submit-book">Add Book</button>
                    <button type="button" class="close-dialog">Cancel</button>
                </div>
            </form>
        </dialog>
    </div>

    <script src="script.js"></script>
</body>

</html>
